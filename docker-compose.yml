# docker-compose.yml

services:
  serverpulse:
    build: .
    container_name: server_pulse
    ports:
      - "8000:8000"
    restart: unless-stopped
    # Needed so psutil inside the container reads the host's real CPU, RAM, disk stats and not the containers isolated stats
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys