<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ServerPulse</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="dashboard">
        <h1>ServerPulse</h1>
        <p class="hostname" id="hostname">Loading...</p>

        <div class="grid">
            <div class="card">
                <h2>CPU</h2>
                <p class="metric" id="cpu">--%</p>
            </div>
            <div class="card">
                <h2>RAM</h2>
                <p class="metric" id="ram">--%</p>
            </div>
            <div class="card">
                <h2>Disk</h2>
                <p class="metric" id="disk">--%</p>
            </div>
            <div class="card">
                <h2>Temperature</h2>
                <p class="metric" id="temperature">--°C</p>
            </div>
            <div class="card">
                <h2>Uptime</h2>
                <p class="metric" id="uptime">--</p>
            </div>
            <div class="card">
                <h2>Network</h2>
                <p class="metric" id="network">-- / --</p>
            </div>
        </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
